name: gifmonster-node-ci

on:
  pull_request:
    paths:
      - 'gifmonster-core/**'
      - 'gifmonster-node/**'
      - '.github/workflows/gifmonster-node-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'gifmonster-core/**'
      - 'gifmonster-node/**'
      - '.github/workflows/gifmonster-node-ci.yml'

jobs:
  node-addon-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gifmonster-node
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: gifmonster-node/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build addon
        run: npm run build

      - name: Run integration tests
        run: npm test

  prebuild-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x64-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: linux-x64-musl
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: darwin-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: darwin-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: win32-x64-msvc

    defaults:
      run:
        working-directory: gifmonster-node

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: gifmonster-node/package-lock.json

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install npm dependencies
        run: npm ci

      - name: Build native binary
        run: npx napi build --release --target ${{ matrix.target }}

      - name: Collect build outputs
        shell: bash
        run: |
          mkdir -p ../artifacts/${{ matrix.artifact }}
          cp -v ./*.node ../artifacts/${{ matrix.artifact }}/
          cp -v npm/${{ matrix.artifact }}/package.json ../artifacts/${{ matrix.artifact }}/

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: gifmonster-${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}
